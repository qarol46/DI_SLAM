imu_preintegration_node:
  ros__parameters:
    # Физические параметры
    gravity: 9.81
    
    # Шумы IMU (подберите под ваш сенсор!)
    # Для MPU6050:
    sigma_g: 0.004      # rad/s/sqrt(s)
    sigma_a: 0.08         # m/s^2/sqrt(s)
    sigma_bg: 0.0002     # rad/s^2/sqrt(s)
    sigma_ba: 0.002       # m/s^3/sqrt(s)
    
    # Вывод данных
    output_directory: "/tmp/imu_test"
    export_enabled: true
    
    # Частота публикации (Hz)
    publish_rate: 10.0